<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Esti — Your Search Assignment</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }

    #app { display: flex; flex-direction: column; min-height: 100dvh; max-width: 480px; margin: 0 auto; }

    .warning-banner {
      background: #fef3c7; color: #92400e; font-size: 13px; font-weight: 600;
      padding: 10px 16px; text-align: center; border-bottom: 1px solid #fde68a;
    }

    .header {
      padding: 20px 16px 12px; background: #fff; border-bottom: 1px solid #e2e8f0;
    }
    .header-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; }
    .header-name { font-size: 22px; font-weight: 800; color: #0f172a; margin-top: 2px; }
    .header-cell { font-size: 15px; font-weight: 600; color: #2563eb; margin-top: 2px; }
    .header-unassigned { font-size: 15px; color: #94a3b8; margin-top: 2px; }

    #map { flex: 0 0 220px; width: 100%; z-index: 0; background: #e2e8f0; }

    .body { flex: 1; padding: 20px 16px 32px; display: flex; flex-direction: column; gap: 16px; }

    .status-bar {
      display: flex; align-items: center; gap: 10px;
      background: #f1f5f9; border-radius: 10px; padding: 12px 14px;
    }
    .signal-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: #94a3b8;
    }
    .signal-dot.connected { background: #16a34a; }
    .signal-dot.no-signal { background: #ef4444; }
    .status-text { font-size: 13px; color: #475569; font-weight: 500; }

    .btn {
      display: block; width: 100%; padding: 16px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer; text-align: center;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-ghost { background: #f1f5f9; color: #475569; font-size: 14px; padding: 12px; }
    .btn-stop { background: #fee2e2; color: #b91c1c; font-size: 14px; padding: 12px; }

    .call-link {
      display: block; text-align: center; color: #2563eb; font-size: 14px;
      font-weight: 600; text-decoration: none; padding: 8px;
    }
    .call-link:active { opacity: 0.7; }

    .done-state { text-align: center; padding: 32px 16px; }
    .done-icon { font-size: 48px; margin-bottom: 12px; }
    .done-title { font-size: 20px; font-weight: 800; color: #0f172a; }
    .done-sub { font-size: 14px; color: #64748b; margin-top: 6px; }

    .error-state { text-align: center; padding: 40px 16px; }
    .error-title { font-size: 18px; font-weight: 700; color: #b91c1c; }
    .error-sub { font-size: 14px; color: #64748b; margin-top: 8px; }

    .loading { text-align: center; padding: 60px 16px; color: #94a3b8; font-size: 15px; }

    #controls { display: none; flex-direction: column; gap: 10px; }
    #controls.visible { display: flex; }
    #start-btn-wrap { display: block; }
  </style>
</head>
<body>
<div id="app">
  <div class="warning-banner">Keep this page open during the search. Plug in or carry a charger.</div>
  <div class="header" id="header">
    <div class="loading">Loading your assignment…</div>
  </div>
  <div id="map"></div>
  <div class="body" id="body-content">
    <!-- populated by JS -->
  </div>
</div>

<script>
(function () {
  // Parse token from URL path: /v/<token>
  const token = window.location.pathname.replace(/^\/v\//, "").split("?")[0];
  const searchId = new URLSearchParams(window.location.search).get("s") || "default";

  const BASE = window.location.origin;

  let volunteer = null;
  let watchId = null;
  let wakeLock = null;
  let lastPingAt = 0;
  let lastSuccessAt = 0;
  let pingTimer = null;
  let counterTimer = null;
  let tracking = false;
  const PING_INTERVAL = 25 * 1000;

  const header = document.getElementById("header");
  const body = document.getElementById("body-content");

  // --- Leaflet map (init once) ---
  const map = L.map("map", { zoomControl: false, attributionControl: false, dragging: true });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
  let destMarker = null;

  function initMap(coords) {
    if (!coords) return;
    const [lng, lat] = coords;
    map.setView([lat, lng], 15);
    destMarker = L.marker([lat, lng], {
      icon: L.divIcon({
        className: "",
        html: '<div style="width:16px;height:16px;background:#2563eb;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 2px #2563eb;"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8],
      }),
    }).addTo(map);
  }

  // --- Render header ---
  function renderHeader(v) {
    const name = `${v.firstName} ${v.lastName}`;
    const cellLine = v.assignedCell
      ? `<div class="header-cell">Grid ${v.assignedCell}</div>`
      : `<div class="header-unassigned">No assignment yet — stand by</div>`;
    header.innerHTML = `
      <div class="header-label">Your assignment</div>
      <div class="header-name">Hi, ${escHtml(name)}</div>
      ${cellLine}
    `;
  }

  // --- Render body states ---
  function renderReady() {
    body.innerHTML = `
      <div id="start-btn-wrap">
        <button class="btn btn-primary" id="startBtn">I Am Here — Start Tracking</button>
      </div>
    `;
    document.getElementById("startBtn").addEventListener("click", startTracking);
  }

  function renderTracking() {
    body.innerHTML = `
      <div class="status-bar">
        <div class="signal-dot" id="signalDot"></div>
        <div class="status-text" id="statusText">Connecting…</div>
      </div>
      <div id="controls" class="visible" style="flex-direction:column;gap:10px;">
        <button class="btn btn-success" id="completeBtn">I Have Completed My Search</button>
        <button class="btn btn-stop" id="stopBtn">Stop Sharing My Location</button>
        ${volunteer.dispatchPhone ? `<a class="call-link" href="tel:${escAttr(volunteer.dispatchPhone)}">Call Dispatch: ${escHtml(volunteer.dispatchPhone)}</a>` : ""}
      </div>
    `;
    document.getElementById("completeBtn").addEventListener("click", markComplete);
    document.getElementById("stopBtn").addEventListener("click", stopSharing);
  }

  function renderDone(message) {
    if (pingTimer) clearInterval(pingTimer);
    if (counterTimer) clearInterval(counterTimer);
    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    if (wakeLock) wakeLock.release().catch(() => {});
    body.innerHTML = `
      <div class="done-state">
        <div class="done-icon">✓</div>
        <div class="done-title">${escHtml(message)}</div>
        <div class="done-sub">Stand by for further instructions.</div>
      </div>
    `;
  }

  function renderError(msg) {
    header.innerHTML = `<div class="error-state"><div class="error-title">Link error</div><div class="error-sub">${escHtml(msg)}</div></div>`;
    document.getElementById("map").style.display = "none";
    body.innerHTML = "";
  }

  // --- Tracking ---
  async function startTracking() {
    const btn = document.getElementById("startBtn");
    if (btn) { btn.disabled = true; btn.textContent = "Requesting location…"; }

    // First: request permission and get initial fix
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        await sendPing(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
        activateTracking();
      },
      (err) => {
        if (btn) { btn.disabled = false; btn.textContent = "I Am Here — Start Tracking"; }
        alert("Location access is required. Please allow location and try again. Error: " + err.message);
      },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  }

  function activateTracking() {
    tracking = true;
    renderTracking();

    // Wake Lock
    if ("wakeLock" in navigator) {
      navigator.wakeLock.request("screen").then((wl) => {
        wakeLock = wl;
      }).catch(() => {});
    }

    // Re-acquire Wake Lock if released (user returned to tab)
    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        if ("wakeLock" in navigator && (!wakeLock || wakeLock.released)) {
          try { wakeLock = await navigator.wakeLock.request("screen"); } catch {}
        }
        // Recovery ping
        if (tracking) {
          navigator.geolocation.getCurrentPosition(
            (pos) => sendPing(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy),
            () => {}
          );
        }
      }
    });

    // Continuous watch
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        const now = Date.now();
        if (now - lastPingAt >= PING_INTERVAL) {
          sendPing(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
        }
      },
      () => setSignal(false),
      { enableHighAccuracy: true, maximumAge: 10000 }
    );

    // Fallback interval in case watchPosition is quiet
    pingTimer = setInterval(() => {
      if (Date.now() - lastPingAt >= PING_INTERVAL) {
        navigator.geolocation.getCurrentPosition(
          (pos) => sendPing(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy),
          () => setSignal(false)
        );
      }
    }, PING_INTERVAL);

    // Counter updater
    counterTimer = setInterval(updateCounter, 5000);
    updateCounter();
  }

  async function sendPing(lat, lng, accuracy) {
    lastPingAt = Date.now();
    try {
      const res = await fetch(`${BASE}/api/volunteer`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, lat, lng, accuracy, searchId }),
      });
      if (res.ok) {
        lastSuccessAt = Date.now();
        setSignal(true);
      } else {
        setSignal(false);
      }
    } catch {
      setSignal(false);
    }
  }

  function setSignal(ok) {
    const dot = document.getElementById("signalDot");
    const text = document.getElementById("statusText");
    if (!dot || !text) return;
    dot.className = "signal-dot " + (ok ? "connected" : "no-signal");
    if (!ok) text.textContent = "No signal — retrying…";
    else updateCounter();
  }

  function updateCounter() {
    const text = document.getElementById("statusText");
    if (!text || !lastSuccessAt) return;
    const secs = Math.round((Date.now() - lastSuccessAt) / 1000);
    text.textContent = secs < 5 ? "Just updated" : `Updated ${secs}s ago`;
  }

  async function markComplete() {
    try {
      await fetch(`${BASE}/api/volunteer/complete`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, searchId }),
      });
    } catch {}
    renderDone("Search complete. Thank you!");
  }

  function stopSharing() {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (pingTimer) { clearInterval(pingTimer); pingTimer = null; }
    if (counterTimer) { clearInterval(counterTimer); counterTimer = null; }
    if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
    tracking = false;
    body.innerHTML = `
      <div class="done-state">
        <div class="done-title">Location sharing stopped.</div>
        <div class="done-sub">Dispatch has been notified. Tap the button below if you resume.</div>
      </div>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" onclick="location.reload()">Resume Tracking</button>
      </div>
    `;
  }

  // --- Utils ---
  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function escAttr(s) {
    return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  // --- Boot ---
  async function boot() {
    if (!token || token.length < 8) { renderError("This link looks invalid. Ask dispatch for a new one."); return; }
    try {
      const res = await fetch(`${BASE}/api/volunteer?token=${encodeURIComponent(token)}&s=${encodeURIComponent(searchId)}`);
      if (res.status === 403) { renderError("This link has expired or is invalid. Contact dispatch."); return; }
      if (!res.ok) { renderError("Could not load your assignment. Check your connection and reload."); return; }
      const data = await res.json();
      volunteer = data.volunteer;
      renderHeader(volunteer);
      if (volunteer.assignedCellCoords) initMap(volunteer.assignedCellCoords);
      else { document.getElementById("map").style.background = "#e2e8f0"; map.setView([43.75, -79.45], 11); }
      renderReady();
    } catch {
      renderError("Could not load your assignment. Check your connection and reload.");
    }
  }

  boot();
})();
</script>
</body>
</html>
