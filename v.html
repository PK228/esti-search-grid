<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esti — Your Search Assignment</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }

    #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; overflow: hidden; }

    /* --- Top chrome --- */
    .warning-banner {
      flex-shrink: 0;
      background: #fef3c7; color: #92400e; font-size: 13px; font-weight: 700;
      padding: 10px 16px; text-align: center; border-bottom: 1px solid #fde68a;
    }
    .header {
      flex-shrink: 0; padding: 10px 16px 8px;
      background: #fff; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .header-left { min-width: 0; }
    .header-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; }
    .header-name { font-size: 17px; font-weight: 800; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-cell { font-size: 13px; font-weight: 700; color: #2563eb; }
    .header-unassigned { font-size: 13px; color: #64748b; }
    .header-nav {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      background: #0f172a; color: #fff; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; padding: 8px 16px;
      min-height: 44px;
      text-decoration: none; cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .header-nav:active { opacity: 0.8; }

    /* --- Map fills remaining space --- */
    #map { flex: 1; min-height: 0; z-index: 0; background: #e2e8f0; }

    /* --- Bottom panel (scrollable controls) --- */
    .bottom-panel {
      flex: 0 0 44vh; overflow-y: scroll; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 14px 16px 40px; display: flex; flex-direction: column; gap: 12px;
      background: #f8fafc; border-top: 1px solid #e2e8f0;
    }

    /* --- GPS status bar --- */
    .status-bar {
      display: flex; align-items: center; gap: 10px;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 14px;
    }
    .signal-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; background: #94a3b8; }
    .signal-dot.connected { background: #16a34a; }
    .signal-dot.no-signal { background: #ef4444; }
    .status-text { font-size: 13px; color: #475569; font-weight: 500; }

    /* --- Missing person card --- */
    .missing-card { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .missing-card-header {
      background: #fef3c7; padding: 8px 14px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #92400e; border-bottom: 1px solid #fde68a;
    }
    .missing-card-body { padding: 12px; display: flex; gap: 12px; align-items: flex-start; }
    .missing-photo { flex-shrink: 0; width: 64px; height: 64px; border-radius: 8px; object-fit: cover; border: 1px solid #e2e8f0; }
    .missing-photo-placeholder {
      flex-shrink: 0; width: 64px; height: 64px; border-radius: 8px;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center; font-size: 24px; color: #94a3b8;
    }
    .missing-details { flex: 1; min-width: 0; }
    .missing-name { font-size: 16px; font-weight: 800; color: #0f172a; }
    .missing-meta { font-size: 12px; color: #475569; margin-top: 2px; }
    .missing-field { margin-top: 6px; }
    .missing-field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; }
    .missing-field-value { font-size: 12px; color: #0f172a; margin-top: 1px; line-height: 1.4; }

    /* --- Section panels --- */
    .section-panel { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .section-panel-header {
      padding: 8px 14px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #475569; border-bottom: 1px solid #e2e8f0; background: #f8fafc;
    }
    .section-panel-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .section-textarea {
      width: 100%; min-height: 64px; padding: 9px 11px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 16px; font-family: inherit; color: #0f172a;
      background: #fff; resize: vertical;
      -webkit-user-select: text; user-select: text;
      touch-action: pan-y;
    }
    .section-textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); outline: none; }
    .clue-list { display: flex; flex-direction: column; gap: 6px; }
    .clue-item { background: #f1f5f9; border-radius: 8px; padding: 7px 10px; font-size: 12px; color: #334155; line-height: 1.4; }
    .clue-item-time { font-size: 10px; color: #64748b; margin-top: 2px; }

    /* --- Buttons --- */
    .btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; min-height: 44px; padding: 12px 14px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer; text-align: center;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active { opacity: 0.75; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:focus-visible { outline: 3px solid rgba(37,99,235,0.5); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) { .btn { transition: none; } }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-backup  { background: #f59e0b; color: #fff; }
    .btn-found   { background: #16a34a; color: #fff; }
    .btn-ghost   { background: #f1f5f9; color: #475569; font-size: 14px; }
    .btn-stop    { background: #fee2e2; color: #b91c1c; font-size: 14px; }

    .call-link { display: block; text-align: center; color: #2563eb; font-size: 13px; font-weight: 600; text-decoration: none; padding: 8px; }
    .call-link:active { opacity: 0.7; }

    /* --- Panel differentiation --- */
    .section-panel.notes-panel { border-left: 3px solid #2563eb; }
    .section-panel.notes-panel .section-panel-header { color: #1d4ed8; background: #eff6ff; border-bottom-color: #bfdbfe; }
    .section-panel.clues-panel { border-left: 3px solid #f59e0b; }
    .section-panel.clues-panel .section-panel-header { color: #92400e; background: #fffbeb; border-bottom-color: #fde68a; }

    /* --- Collapsible action buttons --- */
    .action-dropdown { border: 1.5px solid #e2e8f0; border-radius: 12px; overflow: hidden; background: #fff; }
    .action-dropdown-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 13px 16px; border: none; background: #f1f5f9;
      font-size: 14px; font-weight: 700; color: #334155; cursor: pointer;
      -webkit-tap-highlight-color: transparent; list-style: none;
    }
    .action-dropdown-toggle::-webkit-details-marker { display: none; }
    .action-dropdown-toggle:active { background: #e2e8f0; }
    .action-dropdown-chevron { font-size: 12px; transition: transform 0.2s; }
    .action-dropdown[open] .action-dropdown-chevron { transform: rotate(180deg); }
    .action-dropdown-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

    /* --- Help line --- */
    .help-line {
      text-align: center; font-size: 13px; color: #64748b;
      padding: 8px 0 4px; line-height: 1.5;
    }
    .help-line a { color: #2563eb; font-weight: 700; text-decoration: none; white-space: nowrap; }
    .help-line a:active { opacity: 0.7; }

    .done-state { text-align: center; padding: 24px 16px; }
    .done-icon { display: flex; justify-content: center; margin-bottom: 10px; }
    .done-title { font-size: 18px; font-weight: 800; color: #0f172a; }
    .done-sub { font-size: 13px; color: #64748b; margin-top: 6px; }

    .error-state { text-align: center; padding: 40px 16px; }
    .error-title { font-size: 18px; font-weight: 700; color: #b91c1c; }
    .error-sub { font-size: 14px; color: #64748b; margin-top: 8px; }

    .loading { text-align: center; padding: 60px 16px; color: #94a3b8; font-size: 15px; }

    /* --- Search status summary --- */
    .summary-heading { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin-bottom: 6px; }
    .summary-grid-v { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .summary-item-v { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 8px; text-align: center; }
    .summary-item-v strong { display: block; font-size: 22px; font-weight: 800; color: #0f172a; line-height: 1; }
    .summary-item-v span { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin-top: 3px; }
    .cell-label-v { pointer-events: none; text-align: center; }
    .cell-label-v .cell-id-v {
      display: inline-block; min-width: 38px; padding: 2px 5px;
      border-radius: 6px; background: rgba(15, 23, 42, 0.72); color: #fff;
      font-size: 10px; font-weight: 800; line-height: 1.25;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.22);
    }
    .cell-label-v .cell-count-v {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 16px; margin-left: 2px; border-radius: 999px;
      background: #2563eb; color: #fff; font-size: 10px; font-weight: 800;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.22);
    }
    .own-location-tooltip {
      background: #2563eb; border: 0; color: #fff; border-radius: 6px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.22);
      font-size: 11px; font-weight: 800; padding: 3px 7px;
    }
    .own-location-tooltip::before { border-top-color: #2563eb; }
  </style>
</head>
<body>
<div id="app">
  <div class="warning-banner">Keep this page open. Plug in or carry a charger.</div>
  <div class="header" id="header">
    <div class="header-left"><div class="loading">Loading…</div></div>
  </div>
  <div id="map"></div>
  <div class="bottom-panel" id="body-content"></div>
</div>

<script type="module">
import {
  LABEL_MIN_ZOOM,
  SEARCH_AREA,
  SEARCH_AREA_EXTENDED,
  STATUS,
} from "/src/core/constants.js";
import { buildSearchCellFeatures } from "/src/grid/features.js";

(function () {
  const token = window.location.pathname.replace(/^\/v\//, "").split("?")[0];
  let searchId = new URLSearchParams(window.location.search).get("s") || "default";
  const BASE = window.location.origin;

  let volunteer = null;
  let missingPersonHtml = "";
  let searchCounts = { open: 0, searching: 0, done: 0 };
  let currentLat = null, currentLng = null;
  let watchId = null, wakeLock = null;
  let lastPingAt = 0, lastSuccessAt = 0;
  let pingTimer = null, counterTimer = null;
  let tracking = false;
  const PING_INTERVAL = 25 * 1000;

  const headerEl = document.getElementById("header");
  const bodyEl   = document.getElementById("body-content");

  // ---- Map ----
  const map = L.map("map", { zoomControl: true, attributionControl: false, dragging: true });
  const streetLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
  });
  const satelliteLayer = L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    { maxZoom: 19 },
  );
  let activeBaseLayer = streetLayer;
  let gridGroup = null;
  let labelGroup = L.layerGroup().addTo(map);
  let boundaryLayer = null;
  let extBoundaryLayer = null;
  let activeCellFeatures = [];
  let activeCellStatuses = {};
  let activeExtendedBoundary = SEARCH_AREA_EXTENDED.boundary;
  const STATUS_STYLE = Object.fromEntries(
    Object.entries(STATUS).map(([key, visual]) => [
      key,
      { color: visual.color, fill: visual.fill, opacity: visual.opacity },
    ]),
  );

  streetLayer.addTo(map);
  addSatelliteToggle();
  map.on("zoomend", renderLabels);

  function addSatelliteToggle() {
    const SatToggle = L.Control.extend({
      onAdd() {
        const btn = L.DomUtil.create("button", "leaflet-sat-toggle");
        btn.type = "button";
        btn.title = "Toggle satellite view";
        btn.textContent = "Satellite";
        L.DomEvent.on(btn, "click", (e) => {
          L.DomEvent.stopPropagation(e);
          if (activeBaseLayer === streetLayer) {
            map.removeLayer(streetLayer);
            satelliteLayer.addTo(map);
            activeBaseLayer = satelliteLayer;
            btn.textContent = "Street";
            btn.classList.add("active");
          } else {
            map.removeLayer(satelliteLayer);
            streetLayer.addTo(map);
            activeBaseLayer = streetLayer;
            btn.textContent = "Satellite";
            btn.classList.remove("active");
          }
        });
        return btn;
      },
    });
    new SatToggle({ position: "topright" }).addTo(map);
  }

  function renderBoundaries(extendedBoundary) {
    if (boundaryLayer) map.removeLayer(boundaryLayer);
    if (extBoundaryLayer) map.removeLayer(extBoundaryLayer);

    boundaryLayer = L.polygon(SEARCH_AREA.boundary.map(([lng, lat]) => [lat, lng]), {
      color: "#111827",
      weight: 2.5,
      opacity: 0.95,
      fill: false,
      interactive: false,
    }).addTo(map);

    extBoundaryLayer = L.polygon(extendedBoundary.map(([lng, lat]) => [lat, lng]), {
      color: "#111827",
      weight: 2.5,
      opacity: 0.95,
      fill: false,
      interactive: false,
    }).addTo(map);
  }

  function renderLabels() {
    if (!labelGroup) return;
    labelGroup.clearLayers();
    if (map.getZoom() < LABEL_MIN_ZOOM) return;

    activeCellFeatures.forEach((feature) => {
      const [lng, lat] = feature.properties.center;
      const id = feature.properties.id;
      const searchers = Array.isArray(activeCellStatuses?.[id]?.searchers)
        ? activeCellStatuses[id].searchers
        : [];
      const badge = searchers.length
        ? `<span class="cell-count-v">${searchers.length}</span>`
        : "";
      const label = L.marker([lat, lng], {
        interactive: false,
        icon: L.divIcon({
          className: "cell-label-v",
          html: `<span class="cell-id-v">${escHtml(id)}</span>${badge}`,
          iconSize: [48, 20],
          iconAnchor: [24, 10],
        }),
      });
      labelGroup.addLayer(label);
    });
  }

  // ---- GPS dot ----
  let gpsMarker = null;
  let gpsAccuracyCircle = null;

  function updateGpsDot(lat, lng, accuracy) {
    if (gpsMarker) {
      gpsMarker.setLatLng([lat, lng]);
      if (gpsAccuracyCircle && accuracy) gpsAccuracyCircle.setLatLng([lat, lng]).setRadius(accuracy);
    } else {
      if (accuracy) {
        gpsAccuracyCircle = L.circle([lat, lng], {
          radius: accuracy, color: "#2563eb", weight: 0, fillColor: "#2563eb", fillOpacity: 0.12,
        }).addTo(map);
      }
      gpsMarker = L.circleMarker([lat, lng], {
        radius: 8, color: "#fff", weight: 2.5, fillColor: "#2563eb", fillOpacity: 1, pane: "markerPane",
      }).addTo(map);
      gpsMarker.bindTooltip("You", {
        permanent: true,
        direction: "top",
        offset: [0, -10],
        className: "own-location-tooltip",
      });
    }
  }

  function renderGrid(
    cellFeatures,
    cellStatuses,
    assignedCellId,
    assignedCellCoords,
    assignedCellBounds,
    extendedBoundary,
  ) {
    activeCellFeatures = cellFeatures;
    activeCellStatuses = cellStatuses || {};
    activeExtendedBoundary = extendedBoundary || SEARCH_AREA_EXTENDED.boundary;
    const extendedBounds = L.latLngBounds(activeExtendedBoundary.map(([lng, lat]) => [lat, lng]));
    map.fitBounds(extendedBounds, { padding: [20, 20] });
    if (gridGroup) gridGroup.remove();
    gridGroup = L.layerGroup().addTo(map);
    let assignedBounds = null;
    let assignedLabel = assignedCellId;

    cellFeatures.forEach(feature => {
      const id = feature.properties.id;
      const isExtended = id.startsWith("E-");
      const status = cellStatuses?.[id]?.status || "open";
      const s = STATUS_STYLE[status] || STATUS_STYLE.open;
      const latlngs = feature.geometry.coordinates[0].map(([lng, lat]) => [lat, lng]);

      // Match by ID first; for E- cells also fall back to coordinate containment.
      let isAssigned = id === assignedCellId;
      if (!isAssigned && isExtended && assignedCellCoords) {
        const [aLng, aLat] = assignedCellCoords;
        isAssigned = L.latLngBounds(latlngs).contains([aLat, aLng]);
        if (isAssigned) assignedLabel = id;
      }

      let style;
      if (isAssigned) {
        style = { color: "#1d4ed8", weight: 3.5, fillColor: "#3b82f6", fillOpacity: 0.32, opacity: 1 };
      } else if (isExtended && status === "open") {
        style = { color: "#d97706", weight: 0.7, fillColor: "#fffbeb", fillOpacity: 0.05, opacity: 0.55 };
      } else {
        style = { color: s.color, weight: 1, fillColor: s.fill, fillOpacity: s.opacity, opacity: 0.65 };
      }

      L.polygon(latlngs, style)
        .bindTooltip(`Grid ${id}`, { direction: "top", sticky: true })
        .addTo(gridGroup);

      if (isAssigned) {
        assignedBounds = L.latLngBounds(latlngs);
        const [clng, clat] = feature.properties.center;
        L.marker([clat, clng], {
          icon: L.divIcon({
            className: "",
            html: `<div style="background:#1d4ed8;color:#fff;font-size:12px;font-weight:800;padding:3px 8px;border-radius:6px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.35);">Grid ${assignedLabel} — Your area</div>`,
            iconAnchor: [0, 0],
          }),
        }).addTo(gridGroup);
      }
    });

    renderBoundaries(activeExtendedBoundary);

    if (assignedBounds) {
      map.fitBounds(assignedBounds, { padding: [50, 50], maxZoom: 16 });
    } else if (Array.isArray(assignedCellBounds) && assignedCellBounds.length === 2) {
      map.fitBounds(assignedCellBounds, { padding: [50, 50], maxZoom: 16 });
    } else {
      map.fitBounds(extendedBounds, { padding: [20, 20] });
    }
    renderLabels();
  }

  // ---- Renderers ----
  function renderMissingPerson(mp) {
    if (!mp || !mp.name) return "";
    const metaParts = [mp.age, mp.gender, mp.category].filter(Boolean);
    const photo = mp.photoData
      ? `<img class="missing-photo" src="${escAttr(mp.photoData)}" alt="Photo" />`
      : `<div class="missing-photo-placeholder" aria-label="No photo"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`;
    const fields = [
      mp.description  && `<div class="missing-field"><div class="missing-field-label">Description</div><div class="missing-field-value">${escHtml(mp.description)}</div></div>`,
      mp.clothing     && `<div class="missing-field"><div class="missing-field-label">Clothing</div><div class="missing-field-value">${escHtml(mp.clothing)}</div></div>`,
      mp.medicalNotes && `<div class="missing-field"><div class="missing-field-label">Medical notes</div><div class="missing-field-value">${escHtml(mp.medicalNotes)}</div></div>`,
    ].filter(Boolean).join("");
    return `
      <div class="missing-card">
        <div class="missing-card-header">Who we are looking for</div>
        <div class="missing-card-body">
          ${photo}
          <div class="missing-details">
            <div class="missing-name">${escHtml(mp.name)}</div>
            ${metaParts.length ? `<div class="missing-meta">${escHtml(metaParts.join(" · "))}</div>` : ""}
            ${fields}
          </div>
        </div>
      </div>`;
  }

  function renderHeader(v) {
    const cellLine = v.assignedCell
      ? `<div class="header-cell">Grid ${escHtml(v.assignedCell)}</div>`
      : `<div class="header-unassigned">No assignment yet — stand by</div>`;
    const navUrl = buildNavUrl(v.assignedCellCoords);
    const navBtn = v.assignedCell
      ? `<a class="header-nav" href="${escAttr(navUrl || "#")}"${navUrl ? ' target="_blank"' : ""}>↗ Navigate</a>`
      : "";
    headerEl.innerHTML = `
      <div class="header-left">
        <div class="header-label">Volunteer</div>
        <div class="header-name">${escHtml(v.firstName + " " + v.lastName)}</div>
        ${cellLine}
      </div>
      ${navBtn}`;
  }

  function buildNavUrl(coords) {
    if (!Array.isArray(coords) || coords.length < 2) return null;
    const [lng, lat] = coords;
    return Number.isFinite(lat) && Number.isFinite(lng)
      ? `https://maps.google.com/?daddr=${lat},${lng}`
      : null;
  }

  function renderMain() {
    const phone = volunteer.dispatchPhone;
    bodyEl.innerHTML = `
      <div class="status-bar">
        <div class="signal-dot" id="signalDot"></div>
        <div class="status-text" id="statusText">Waiting for GPS…</div>
      </div>
      ${missingPersonHtml}
      <div class="section-panel notes-panel">
        <div class="section-panel-header">Notes for dispatch</div>
        <div class="section-panel-body">
          <textarea class="section-textarea" id="noteInput" placeholder="Type a note for dispatch…"></textarea>
          <button class="btn btn-ghost" id="sendNoteBtn">Send note</button>
        </div>
      </div>
      <div class="section-panel clues-panel">
        <div class="section-panel-header">Report a clue</div>
        <div class="section-panel-body">
          <textarea class="section-textarea" id="clueInput" placeholder="Describe what you found and where…"></textarea>
          <button class="btn btn-ghost" id="sendClueBtn">Submit clue</button>
          <div class="clue-list" id="clueList"></div>
        </div>
      </div>
      <details class="action-dropdown" id="actionDropdown">
        <summary class="action-dropdown-toggle">Status &amp; Alerts <span class="action-dropdown-chevron">▾</span></summary>
        <div class="action-dropdown-body">
          <button class="btn btn-backup"  id="backupBtn">Need Backup</button>
          <button class="btn btn-found"   id="foundBtn">Found Missing Person</button>
          <button class="btn btn-primary" id="completeBtn">Search Complete</button>
          <button class="btn btn-stop"    id="stopBtn">Stop Sharing My Location</button>
        </div>
      </details>
      ${phone ? `<a class="call-link" href="tel:${escAttr(phone)}">Call Dispatch: ${escHtml(phone)}</a>` : ""}
      <div class="help-line">Questions or need help? Call our team:<br /><a href="tel:+16478259939">647-825-9939</a></div>
    `;
    document.getElementById("sendNoteBtn").addEventListener("click", sendNote);
    document.getElementById("sendClueBtn").addEventListener("click", submitClue);
    document.getElementById("backupBtn").addEventListener("click", requestBackup);
    document.getElementById("foundBtn").addEventListener("click", reportFound);
    document.getElementById("completeBtn").addEventListener("click", markComplete);
    document.getElementById("stopBtn").addEventListener("click", stopSharing);
  }

  function renderDone(message) {
    stopTracking();
    bodyEl.innerHTML = `
      <div class="done-state">
        <div class="done-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="done-title">${escHtml(message)}</div>
        <div class="done-sub">Stand by for further instructions.</div>
      </div>`;
  }

  function renderError(msg) {
    headerEl.innerHTML = `<div class="header-left"><div class="error-state"><div class="error-title">Link error</div><div class="error-sub">${escHtml(msg)}</div></div></div>`;
    document.getElementById("map").style.display = "none";
    bodyEl.innerHTML = "";
  }

  // ---- GPS (auto-start) ----
  function startAutoTracking() {
    navigator.geolocation.getCurrentPosition(
      pos => {
        currentLat = pos.coords.latitude; currentLng = pos.coords.longitude;
        updateGpsDot(currentLat, currentLng, pos.coords.accuracy);
        sendPing(currentLat, currentLng, pos.coords.accuracy);
        activateWatch();
      },
      () => setSignal(false, "GPS denied — location sharing is required"),
      { enableHighAccuracy: true, timeout: 20000 }
    );
  }

  function activateWatch() {
    tracking = true;
    if ("wakeLock" in navigator) navigator.wakeLock.request("screen").then(wl => { wakeLock = wl; }).catch(() => {});
    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        if ("wakeLock" in navigator && (!wakeLock || wakeLock.released)) { try { wakeLock = await navigator.wakeLock.request("screen"); } catch {} }
        if (tracking && currentLat !== null) sendPing(currentLat, currentLng, null);
      }
    });
    watchId = navigator.geolocation.watchPosition(
      pos => {
        currentLat = pos.coords.latitude; currentLng = pos.coords.longitude;
        updateGpsDot(currentLat, currentLng, pos.coords.accuracy);
        if (Date.now() - lastPingAt >= PING_INTERVAL) sendPing(currentLat, currentLng, pos.coords.accuracy);
      },
      () => setSignal(false),
      { enableHighAccuracy: true, maximumAge: 10000 }
    );
    pingTimer = setInterval(() => {
      if (Date.now() - lastPingAt >= PING_INTERVAL && currentLat !== null) sendPing(currentLat, currentLng, null);
    }, PING_INTERVAL);
    counterTimer = setInterval(updateCounter, 5000);
  }

  function stopTracking() {
    tracking = false;
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (pingTimer) { clearInterval(pingTimer); pingTimer = null; }
    if (counterTimer) { clearInterval(counterTimer); counterTimer = null; }
    if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
  }

  async function sendPing(lat, lng, accuracy) {
    lastPingAt = Date.now();
    try {
      const res = await fetch(`${BASE}/api/volunteer`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, lat, lng, accuracy, searchId }),
      });
      if (res.ok) {
        const data = await res.json().catch(() => null);
        const confirmed = data?.position;
        if (
          confirmed &&
          Number.isFinite(confirmed.lat) &&
          Number.isFinite(confirmed.lng)
        ) {
          updateGpsDot(confirmed.lat, confirmed.lng, confirmed.accuracy);
        }
        lastSuccessAt = Date.now();
        setSignal(true);
      } else setSignal(false);
    } catch { setSignal(false); }
  }

  function setSignal(ok, msg) {
    const dot = document.getElementById("signalDot");
    const txt = document.getElementById("statusText");
    if (!dot || !txt) return;
    dot.className = "signal-dot " + (ok ? "connected" : "no-signal");
    if (!ok) txt.textContent = msg || "No signal — retrying…";
    else updateCounter();
  }

  function updateCounter() {
    const txt = document.getElementById("statusText");
    if (!txt || !lastSuccessAt) return;
    const secs = Math.round((Date.now() - lastSuccessAt) / 1000);
    txt.textContent = secs < 5
      ? "GPS active — dispatch received your ping"
      : `GPS active — dispatch received your ping ${secs}s ago`;
  }

  // ---- Volunteer actions ----
  async function sendNote() {
    const input = document.getElementById("noteInput");
    const text = (input?.value || "").trim();
    if (!text) return;
    const btn = document.getElementById("sendNoteBtn");
    btn.disabled = true; btn.textContent = "Sending…";
    try {
      const res = await fetch(`${BASE}/api/volunteer/note`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, searchId, note: text }),
      });
      if (res.ok) { input.value = ""; btn.textContent = "Note sent ✓"; setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = "Send note"; } }, 2500); }
      else throw new Error();
    } catch { btn.disabled = false; btn.textContent = "Send note"; alert("Could not send note — check your connection."); }
  }

  async function submitClue() {
    const input = document.getElementById("clueInput");
    const text = (input?.value || "").trim();
    if (!text) return;
    const btn = document.getElementById("sendClueBtn");
    btn.disabled = true; btn.textContent = "Submitting…";
    try {
      const res = await fetch(`${BASE}/api/volunteer/clue`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, searchId, description: text, lat: currentLat, lng: currentLng }),
      });
      if (res.ok) {
        input.value = ""; btn.textContent = "Clue submitted ✓";
        setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = "Submit clue"; } }, 2500);
        const list = document.getElementById("clueList");
        if (list) {
          const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
          const item = document.createElement("div"); item.className = "clue-item";
          item.innerHTML = `${escHtml(text)}<div class="clue-item-time">${time}</div>`;
          list.prepend(item);
        }
      } else throw new Error();
    } catch { btn.disabled = false; btn.textContent = "Submit clue"; alert("Could not submit clue — check your connection."); }
  }

  async function requestBackup() {
    const btn = document.getElementById("backupBtn");
    btn.disabled = true; btn.textContent = "Sending…";
    try {
      const res = await fetch(`${BASE}/api/volunteer/backup`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, searchId }),
      });
      if (res.ok) { btn.textContent = "Backup requested ✓"; } else throw new Error();
    } catch { btn.disabled = false; btn.textContent = "Need Backup"; alert("Could not send backup request — check your connection."); }
  }

  async function reportFound() {
    if (!confirm("Confirm: you have found the missing person?")) return;
    const btn = document.getElementById("foundBtn");
    btn.disabled = true; btn.textContent = "Notifying dispatch…";
    try {
      const res = await fetch(`${BASE}/api/volunteer/found`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, searchId }),
      });
      if (res.ok) { renderDone("Missing person found! Dispatch has been notified."); }
      else throw new Error();
    } catch { btn.disabled = false; btn.textContent = "Found Missing Person"; alert("Could not notify dispatch — check your connection."); }
  }

  async function markComplete() {
    const btn = document.getElementById("completeBtn");
    btn.disabled = true; btn.textContent = "Marking complete…";
    try { await fetch(`${BASE}/api/volunteer/complete`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token, searchId }) }); } catch {}
    renderDone("Search complete. Thank you!");
  }

  function stopSharing() {
    stopTracking();
    bodyEl.innerHTML = `
      <div class="done-state">
        <div class="done-title">Location sharing stopped.</div>
        <div class="done-sub">Dispatch can no longer see your location.</div>
      </div>
      <div style="margin-top:16px;"><button class="btn btn-primary" onclick="location.reload()">Resume Tracking</button></div>`;
  }

  // ---- Utils ----
  function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function escAttr(s) { return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }

  // ---- Boot ----
  async function boot() {
    if (!token || token.length < 8) { renderError("This link looks invalid. Ask dispatch for a new one."); return; }
    try {
      const volRes = await fetch(`${BASE}/api/volunteer?token=${encodeURIComponent(token)}&s=${encodeURIComponent(searchId)}`);
      if (volRes.status === 403) { renderError("This link has expired or is invalid. Contact dispatch."); return; }
      if (!volRes.ok) { renderError("Could not load your assignment. Check your connection and reload."); return; }

      const data = await volRes.json();
      volunteer = data.volunteer;
      if (volunteer?.searchId && volunteer.searchId !== searchId) {
        searchId = volunteer.searchId;
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("s", searchId);
        window.history.replaceState(null, "", nextUrl.toString());
      }

      const stateRes = await fetch(`${BASE}/api/state?s=${encodeURIComponent(searchId)}`);

      let cellStatuses = {};
      let extendedBoundary = SEARCH_AREA_EXTENDED.boundary;
      if (stateRes.ok) {
        const stateData = await stateRes.json();
        missingPersonHtml = renderMissingPerson(stateData?.state?.missingPerson);
        cellStatuses = stateData?.state?.cells || {};
        if (Array.isArray(stateData?.state?.customExtendedBoundary)) {
          extendedBoundary = stateData.state.customExtendedBoundary;
        }
      }

      renderHeader(volunteer);

      // Build and render the full grid (primary + extended), with assigned cell highlighted
      try {
        const { cellFeatures } = buildSearchCellFeatures(extendedBoundary);
        renderGrid(
          cellFeatures,
          cellStatuses,
          volunteer.assignedCell || null,
          volunteer.assignedCellCoords || null,
          volunteer.assignedCellBounds || null,
          extendedBoundary,
        );
        let sc = 0, dc = 0;
        Object.values(cellStatuses).forEach(c => {
          if (c.status === "searching") sc++;
          else if (c.status === "done") dc++;
        });
        searchCounts = { open: Math.max(0, cellFeatures.length - sc - dc), searching: sc, done: dc };
      } catch (err) {
        console.error("Token grid render failed:", err);
        // Turf unavailable — fall back to a simple view of the assigned cell
        if (volunteer.assignedCellCoords) {
          const [lng, lat] = volunteer.assignedCellCoords;
          map.setView([lat, lng], 15);
        } else {
          map.setView([43.75, -79.45], 11);
        }
      }

      renderMain();
      startAutoTracking();
    } catch {
      renderError("Could not load your assignment. Check your connection and reload.");
    }
  }

  boot();
})();
</script>
