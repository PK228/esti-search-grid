<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Esti — Your Search Assignment</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; }

    #app { display: flex; flex-direction: column; min-height: 100dvh; max-width: 480px; margin: 0 auto; }

    .warning-banner {
      background: #fef3c7; color: #92400e; font-size: 13px; font-weight: 600;
      padding: 10px 16px; text-align: center; border-bottom: 1px solid #fde68a;
    }

    .header { padding: 16px 16px 12px; background: #fff; border-bottom: 1px solid #e2e8f0; }
    .header-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; }
    .header-name { font-size: 20px; font-weight: 800; color: #0f172a; margin-top: 2px; }
    .header-cell { font-size: 15px; font-weight: 600; color: #2563eb; margin-top: 2px; }
    .header-unassigned { font-size: 15px; color: #94a3b8; margin-top: 2px; }

    #map { flex: 0 0 220px; width: 100%; z-index: 0; background: #e2e8f0; }

    .nav-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px; background: #0f172a; color: #fff;
      border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      text-decoration: none; cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { opacity: 0.8; }
    .nav-btn-icon { font-size: 18px; flex-shrink: 0; }

    .body { flex: 1; padding: 16px 16px 40px; display: flex; flex-direction: column; gap: 14px; }

    /* --- GPS status bar --- */
    .status-bar {
      display: flex; align-items: center; gap: 10px;
      background: #f1f5f9; border-radius: 10px; padding: 11px 14px;
    }
    .signal-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: #94a3b8;
    }
    .signal-dot.connected { background: #16a34a; }
    .signal-dot.no-signal { background: #ef4444; }
    .status-text { font-size: 13px; color: #475569; font-weight: 500; }

    /* --- Missing person card --- */
    .missing-card { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .missing-card-header {
      background: #fef3c7; padding: 9px 14px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #92400e; border-bottom: 1px solid #fde68a;
    }
    .missing-card-body { padding: 14px; display: flex; gap: 12px; align-items: flex-start; }
    .missing-photo {
      flex-shrink: 0; width: 72px; height: 72px; border-radius: 8px;
      object-fit: cover; background: #f1f5f9; border: 1px solid #e2e8f0;
    }
    .missing-photo-placeholder {
      flex-shrink: 0; width: 72px; height: 72px; border-radius: 8px;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #94a3b8;
    }
    .missing-details { flex: 1; min-width: 0; }
    .missing-name { font-size: 17px; font-weight: 800; color: #0f172a; }
    .missing-meta { font-size: 13px; color: #475569; margin-top: 2px; }
    .missing-field { margin-top: 8px; }
    .missing-field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; }
    .missing-field-value { font-size: 13px; color: #0f172a; margin-top: 1px; line-height: 1.4; }

    /* --- Section panels (notes, clues) --- */
    .section-panel { background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .section-panel-header {
      padding: 9px 14px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #475569; border-bottom: 1px solid #e2e8f0; background: #f8fafc;
    }
    .section-panel-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .section-textarea {
      width: 100%; min-height: 72px; padding: 10px 12px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; font-family: inherit; color: #0f172a;
      background: #f8fafc; resize: vertical; outline: none;
    }
    .section-textarea:focus { border-color: #93c5fd; background: #fff; }
    .clue-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .clue-item {
      background: #f1f5f9; border-radius: 8px; padding: 8px 10px;
      font-size: 13px; color: #334155; line-height: 1.4;
    }
    .clue-item-time { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    /* --- Buttons --- */
    .btn {
      display: block; width: 100%; padding: 15px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer; text-align: center;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-backup { background: #f59e0b; color: #fff; }
    .btn-found { background: #16a34a; color: #fff; }
    .btn-ghost { background: #f1f5f9; color: #475569; font-size: 14px; padding: 11px; }
    .btn-stop { background: #fee2e2; color: #b91c1c; font-size: 13px; padding: 11px; }

    .call-link {
      display: block; text-align: center; color: #2563eb; font-size: 14px;
      font-weight: 600; text-decoration: none; padding: 8px;
    }
    .call-link:active { opacity: 0.7; }

    .done-state { text-align: center; padding: 32px 16px; }
    .done-icon { font-size: 48px; margin-bottom: 12px; }
    .done-title { font-size: 20px; font-weight: 800; color: #0f172a; }
    .done-sub { font-size: 14px; color: #64748b; margin-top: 6px; }

    .error-state { text-align: center; padding: 40px 16px; }
    .error-title { font-size: 18px; font-weight: 700; color: #b91c1c; }
    .error-sub { font-size: 14px; color: #64748b; margin-top: 8px; }

    .loading { text-align: center; padding: 60px 16px; color: #94a3b8; font-size: 15px; }
  </style>
</head>
<body>
<div id="app">
  <div class="warning-banner">Keep this page open during the search. Plug in or carry a charger.</div>
  <div class="header" id="header">
    <div class="loading">Loading your assignment…</div>
  </div>
  <div id="map"></div>
  <div class="body" id="body-content"></div>
</div>

<script>
(function () {
  const token = window.location.pathname.replace(/^\/v\//, "").split("?")[0];
  const searchId = new URLSearchParams(window.location.search).get("s") || "default";
  const BASE = window.location.origin;

  let volunteer = null;
  let missingPersonHtml = "";
  let currentLat = null, currentLng = null;
  let watchId = null;
  let wakeLock = null;
  let lastPingAt = 0;
  let lastSuccessAt = 0;
  let pingTimer = null;
  let counterTimer = null;
  let tracking = false;
  const PING_INTERVAL = 25 * 1000;

  const header = document.getElementById("header");
  const bodyEl = document.getElementById("body-content");

  // --- Map ---
  const map = L.map("map", { zoomControl: false, attributionControl: false, dragging: true });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  function initMap(coords, bounds) {
    if (!coords && !bounds) return;

    if (bounds) {
      // bounds = [[south, west], [north, east]]
      const leafletBounds = L.latLngBounds(bounds[0], bounds[1]);
      L.rectangle(leafletBounds, {
        color: "#2563eb", weight: 2.5, fillColor: "#2563eb", fillOpacity: 0.12,
      }).addTo(map);
      map.fitBounds(leafletBounds, { padding: [28, 28], maxZoom: 17 });
    } else if (coords) {
      const [lng, lat] = coords;
      map.setView([lat, lng], 16);
    }

    if (coords) {
      const [lng, lat] = coords;
      L.marker([lat, lng], {
        icon: L.divIcon({
          className: "",
          html: '<div style="width:16px;height:16px;background:#2563eb;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 2px #2563eb;"></div>',
          iconSize: [16, 16], iconAnchor: [8, 8],
        }),
      }).addTo(map);
    }
  }

  // --- Renderers ---
  function renderMissingPerson(mp) {
    if (!mp || !mp.name) return "";
    const metaParts = [mp.age, mp.gender, mp.category].filter(Boolean);
    const photo = mp.photoData
      ? `<img class="missing-photo" src="${escAttr(mp.photoData)}" alt="Photo" />`
      : `<div class="missing-photo-placeholder">👤</div>`;
    const fields = [
      mp.description && `<div class="missing-field"><div class="missing-field-label">Description</div><div class="missing-field-value">${escHtml(mp.description)}</div></div>`,
      mp.clothing    && `<div class="missing-field"><div class="missing-field-label">Clothing</div><div class="missing-field-value">${escHtml(mp.clothing)}</div></div>`,
      mp.medicalNotes && `<div class="missing-field"><div class="missing-field-label">Medical notes</div><div class="missing-field-value">${escHtml(mp.medicalNotes)}</div></div>`,
    ].filter(Boolean).join("");
    return `
      <div class="missing-card">
        <div class="missing-card-header">Who we are looking for</div>
        <div class="missing-card-body">
          ${photo}
          <div class="missing-details">
            <div class="missing-name">${escHtml(mp.name)}</div>
            ${metaParts.length ? `<div class="missing-meta">${escHtml(metaParts.join(" · "))}</div>` : ""}
            ${fields}
          </div>
        </div>
      </div>`;
  }

  function renderHeader(v) {
    const cellLine = v.assignedCell
      ? `<div class="header-cell">Grid ${escHtml(v.assignedCell)}</div>`
      : `<div class="header-unassigned">No assignment yet — stand by</div>`;
    header.innerHTML = `
      <div class="header-label">Volunteer</div>
      <div class="header-name">${escHtml(v.firstName + " " + v.lastName)}</div>
      ${cellLine}`;
  }

  function buildNavUrl(coords) {
    if (coords && Array.isArray(coords) && coords.length === 2) {
      const [lng, lat] = coords;
      if (Number.isFinite(lat) && Number.isFinite(lng)) {
        return `https://maps.google.com/?daddr=${lat},${lng}`;
      }
    }
    return null;
  }

  function renderMain() {
    const phone = volunteer.dispatchPhone;
    bodyEl.innerHTML = `
      ${missingPersonHtml}

      <div class="status-bar">
        <div class="signal-dot" id="signalDot"></div>
        <div class="status-text" id="statusText">Waiting for GPS…</div>
      </div>

      <div class="section-panel">
        <div class="section-panel-header">Notes for dispatch</div>
        <div class="section-panel-body">
          <textarea class="section-textarea" id="noteInput" placeholder="Type a note for dispatch…"></textarea>
          <button class="btn btn-ghost" id="sendNoteBtn">Send note</button>
        </div>
      </div>

      <div class="section-panel">
        <div class="section-panel-header">Report a clue</div>
        <div class="section-panel-body">
          <textarea class="section-textarea" id="clueInput" placeholder="Describe what you found…"></textarea>
          <button class="btn btn-ghost" id="sendClueBtn">Submit clue</button>
          <div class="clue-list" id="clueList"></div>
        </div>
      </div>

      <button class="btn btn-backup" id="backupBtn">Need Backup</button>
      <button class="btn btn-found"  id="foundBtn">Found Missing Person</button>
      <button class="btn btn-primary" id="completeBtn">Search Complete</button>
      <button class="btn btn-stop"   id="stopBtn">Stop Sharing My Location</button>
      ${phone ? `<a class="call-link" href="tel:${escAttr(phone)}">Call Dispatch: ${escHtml(phone)}</a>` : ""}
    `;

    document.getElementById("sendNoteBtn").addEventListener("click", sendNote);
    document.getElementById("sendClueBtn").addEventListener("click", submitClue);
    document.getElementById("backupBtn").addEventListener("click", requestBackup);
    document.getElementById("foundBtn").addEventListener("click", reportFound);
    document.getElementById("completeBtn").addEventListener("click", markComplete);
    document.getElementById("stopBtn").addEventListener("click", stopSharing);
  }

  function renderDone(message) {
    stopTracking();
    bodyEl.innerHTML = `
      <div class="done-state">
        <div class="done-icon">✓</div>
        <div class="done-title">${escHtml(message)}</div>
        <div class="done-sub">Stand by for further instructions.</div>
      </div>`;
  }

  function renderError(msg) {
    header.innerHTML = `<div class="error-state"><div class="error-title">Link error</div><div class="error-sub">${escHtml(msg)}</div></div>`;
    document.getElementById("map").style.display = "none";
    bodyEl.innerHTML = "";
  }

  // --- GPS tracking (auto-start, no button) ---
  function startAutoTracking() {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        sendPing(currentLat, currentLng, pos.coords.accuracy);
        activateWatch();
      },
      () => setSignal(false, "GPS denied — location sharing is required"),
      { enableHighAccuracy: true, timeout: 20000 }
    );
  }

  function activateWatch() {
    tracking = true;

    if ("wakeLock" in navigator) {
      navigator.wakeLock.request("screen").then((wl) => { wakeLock = wl; }).catch(() => {});
    }

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        if ("wakeLock" in navigator && (!wakeLock || wakeLock.released)) {
          try { wakeLock = await navigator.wakeLock.request("screen"); } catch {}
        }
        if (tracking && currentLat !== null) {
          sendPing(currentLat, currentLng, null);
        }
      }
    });

    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        if (Date.now() - lastPingAt >= PING_INTERVAL) {
          sendPing(currentLat, currentLng, pos.coords.accuracy);
        }
      },
      () => setSignal(false),
      { enableHighAccuracy: true, maximumAge: 10000 }
    );

    pingTimer = setInterval(() => {
      if (Date.now() - lastPingAt >= PING_INTERVAL && currentLat !== null) {
        sendPing(currentLat, currentLng, null);
      }
    }, PING_INTERVAL);

    counterTimer = setInterval(updateCounter, 5000);
  }

  function stopTracking() {
    tracking = false;
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (pingTimer) { clearInterval(pingTimer); pingTimer = null; }
    if (counterTimer) { clearInterval(counterTimer); counterTimer = null; }
    if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
  }

  async function sendPing(lat, lng, accuracy) {
    lastPingAt = Date.now();
    try {
      const res = await fetch(`${BASE}/api/volunteer`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, lat, lng, accuracy, searchId }),
      });
      if (res.ok) { lastSuccessAt = Date.now(); setSignal(true); }
      else setSignal(false);
    } catch { setSignal(false); }
  }

  function setSignal(ok, msg) {
    const dot = document.getElementById("signalDot");
    const text = document.getElementById("statusText");
    if (!dot || !text) return;
    dot.className = "signal-dot " + (ok ? "connected" : "no-signal");
    if (!ok) text.textContent = msg || "No signal — retrying…";
    else updateCounter();
  }

  function updateCounter() {
    const text = document.getElementById("statusText");
    if (!text || !lastSuccessAt) return;
    const secs = Math.round((Date.now() - lastSuccessAt) / 1000);
    text.textContent = secs < 5 ? "GPS active — just updated" : `GPS active — updated ${secs}s ago`;
  }

  // --- Volunteer actions ---
  async function sendNote() {
    const input = document.getElementById("noteInput");
    const text = (input?.value || "").trim();
    if (!text) return;
    const btn = document.getElementById("sendNoteBtn");
    btn.disabled = true; btn.textContent = "Sending…";
    try {
      const res = await fetch(`${BASE}/api/volunteer/note`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, searchId, note: text }),
      });
      if (res.ok) {
        input.value = "";
        btn.textContent = "Note sent ✓";
        setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = "Send note"; } }, 2500);
      } else throw new Error();
    } catch {
      btn.disabled = false; btn.textContent = "Send note";
      alert("Could not send note — check your connection.");
    }
  }

  async function submitClue() {
    const input = document.getElementById("clueInput");
    const text = (input?.value || "").trim();
    if (!text) return;
    const btn = document.getElementById("sendClueBtn");
    btn.disabled = true; btn.textContent = "Submitting…";
    try {
      const res = await fetch(`${BASE}/api/volunteer/clue`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          token, searchId, description: text,
          lat: currentLat, lng: currentLng,
        }),
      });
      if (res.ok) {
        input.value = "";
        btn.textContent = "Clue submitted ✓";
        setTimeout(() => { if (btn) { btn.disabled = false; btn.textContent = "Submit clue"; } }, 2500);
        appendClueToList(text);
      } else throw new Error();
    } catch {
      btn.disabled = false; btn.textContent = "Submit clue";
      alert("Could not submit clue — check your connection.");
    }
  }

  function appendClueToList(text) {
    const list = document.getElementById("clueList");
    if (!list) return;
    const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const item = document.createElement("div");
    item.className = "clue-item";
    item.innerHTML = `${escHtml(text)}<div class="clue-item-time">${time}</div>`;
    list.prepend(item);
  }

  async function requestBackup() {
    const btn = document.getElementById("backupBtn");
    btn.disabled = true; btn.textContent = "Sending…";
    try {
      const res = await fetch(`${BASE}/api/volunteer/backup`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, searchId }),
      });
      if (res.ok) {
        btn.textContent = "Backup requested ✓";
      } else throw new Error();
    } catch {
      btn.disabled = false; btn.textContent = "Need Backup";
      alert("Could not send backup request — check your connection.");
    }
  }

  async function reportFound() {
    if (!confirm("Confirm: you have found the missing person?")) return;
    const btn = document.getElementById("foundBtn");
    btn.disabled = true; btn.textContent = "Notifying dispatch…";
    try {
      const res = await fetch(`${BASE}/api/volunteer/found`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, searchId }),
      });
      if (res.ok) {
        btn.textContent = "Dispatch notified ✓";
        renderDone("Missing person found! Dispatch has been notified.");
      } else throw new Error();
    } catch {
      btn.disabled = false; btn.textContent = "Found Missing Person";
      alert("Could not notify dispatch — check your connection.");
    }
  }

  async function markComplete() {
    const btn = document.getElementById("completeBtn");
    btn.disabled = true; btn.textContent = "Marking complete…";
    try {
      await fetch(`${BASE}/api/volunteer/complete`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, searchId }),
      });
    } catch {}
    renderDone("Search complete. Thank you!");
  }

  function stopSharing() {
    stopTracking();
    bodyEl.innerHTML = `
      <div class="done-state">
        <div class="done-title">Location sharing stopped.</div>
        <div class="done-sub">Dispatch can no longer see your location.</div>
      </div>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" onclick="location.reload()">Resume Tracking</button>
      </div>`;
  }

  // --- Utils ---
  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function escAttr(s) {
    return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  // --- Boot ---
  async function boot() {
    if (!token || token.length < 8) { renderError("This link looks invalid. Ask dispatch for a new one."); return; }
    try {
      const [volRes, stateRes] = await Promise.all([
        fetch(`${BASE}/api/volunteer?token=${encodeURIComponent(token)}&s=${encodeURIComponent(searchId)}`),
        fetch(`${BASE}/api/state?s=${encodeURIComponent(searchId)}`),
      ]);
      if (volRes.status === 403) { renderError("This link has expired or is invalid. Contact dispatch."); return; }
      if (!volRes.ok) { renderError("Could not load your assignment. Check your connection and reload."); return; }
      const data = await volRes.json();
      volunteer = data.volunteer;
      if (stateRes.ok) {
        const stateData = await stateRes.json();
        missingPersonHtml = renderMissingPerson(stateData?.state?.missingPerson);
      }
      renderHeader(volunteer);

      const hasBounds = Array.isArray(volunteer.assignedCellBounds);
      const hasCoords = Array.isArray(volunteer.assignedCellCoords);
      if (hasBounds || hasCoords) {
        initMap(volunteer.assignedCellCoords, volunteer.assignedCellBounds);
      } else {
        map.setView([43.75, -79.45], 11);
      }

      // Navigation button — always shown when a cell is assigned
      if (volunteer.assignedCell) {
        const navUrl = buildNavUrl(volunteer.assignedCellCoords);
        const navEl = document.createElement("a");
        navEl.className = "nav-btn";
        if (navUrl) {
          navEl.href = navUrl;
          navEl.innerHTML = `<span class="nav-btn-icon">↗</span> Navigate to Grid ${escHtml(volunteer.assignedCell)}`;
        } else {
          // Coords not yet saved — link to a general area search as fallback
          navEl.href = `https://maps.google.com/?q=${encodeURIComponent("Keele Yonge Steeles Eglinton Toronto")}`;
          navEl.innerHTML = `<span class="nav-btn-icon">↗</span> Navigate to Grid ${escHtml(volunteer.assignedCell)} <span style="font-size:11px;opacity:0.7;margin-left:4px;">(general area)</span>`;
        }
        document.getElementById("map").after(navEl);
      }

      renderMain();
      startAutoTracking();
    } catch {
      renderError("Could not load your assignment. Check your connection and reload.");
    }
  }

  boot();
})();
</script>
</body>
</html>
