<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Esti — Volunteer Check-In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc; color: #0f172a;
    }

    .page {
      min-height: 100dvh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%; max-width: 420px;
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .card-header { text-align: center; }
    .card-eyebrow {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #64748b; margin-bottom: 6px;
    }
    .card-title { font-size: 24px; font-weight: 800; color: #0f172a; }
    .card-sub { font-size: 14px; color: #64748b; margin-top: 4px; }

    .form-grid { display: flex; flex-direction: column; gap: 14px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: flex; flex-direction: column; gap: 5px; }
    .label-text {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #64748b;
    }
    input {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 9px;
      padding: 12px 13px; font-size: 16px; color: #0f172a;
      background: #fff; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }

    .submit-btn {
      width: 100%; padding: 15px; background: #2563eb; color: #fff;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity 0.15s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .confirm-state {
      text-align: center; padding: 12px 0;
      display: flex; flex-direction: column; gap: 12px;
    }
    .confirm-icon { font-size: 48px; }
    .confirm-title { font-size: 20px; font-weight: 800; }
    .confirm-sub { font-size: 14px; color: #64748b; }

    .error-msg {
      background: #fee2e2; color: #b91c1c; border-radius: 8px;
      padding: 10px 13px; font-size: 13px; font-weight: 600;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>
<div class="page">
  <div class="card" id="card">
    <div class="card-header">
      <div class="card-eyebrow">Search Operation</div>
      <div class="card-title">Volunteer Check-In</div>
      <div class="card-sub">Fill in your details. Dispatch will text you your assignment.</div>
    </div>

    <form id="intakeForm" class="form-grid" novalidate>
      <div class="field-row">
        <label>
          <span class="label-text">First name *</span>
          <input id="firstName" type="text" autocomplete="given-name" placeholder="First" required />
        </label>
        <label>
          <span class="label-text">Last name *</span>
          <input id="lastName" type="text" autocomplete="family-name" placeholder="Last" required />
        </label>
      </div>
      <label>
        <span class="label-text">Phone number</span>
        <input id="phone" type="tel" autocomplete="tel" placeholder="+1 (416) 555-0000" />
      </label>
      <label>
        <span class="label-text">Email address</span>
        <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
      </label>
      <div id="errorMsg" class="error-msg"></div>
      <button type="submit" class="submit-btn" id="submitBtn">I'm Here — Check In</button>
    </form>
  </div>
</div>

<script>
(function () {
  const BASE = window.location.origin;
  const searchId = new URLSearchParams(window.location.search).get("s") || "default";

  document.getElementById("intakeForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const firstName = document.getElementById("firstName").value.trim();
    const lastName  = document.getElementById("lastName").value.trim();
    const phone     = document.getElementById("phone").value.trim();
    const email     = document.getElementById("email").value.trim();
    const errorEl   = document.getElementById("errorMsg");
    const btn       = document.getElementById("submitBtn");

    errorEl.className = "error-msg";

    if (!firstName || !lastName) {
      errorEl.textContent = "First name and last name are required.";
      errorEl.className = "error-msg visible";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Checking in…";

    try {
      const res = await fetch(`${BASE}/api/intake`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ firstName, lastName, phone, email, searchId }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.error || "Server error");
      }
      showConfirm(firstName);
    } catch (err) {
      errorEl.textContent = err.message || "Could not check in. Check your connection and try again.";
      errorEl.className = "error-msg visible";
      btn.disabled = false;
      btn.textContent = "I'm Here — Check In";
    }
  });

  function showConfirm(firstName) {
    const card = document.getElementById("card");
    card.innerHTML = `
      <div class="confirm-state">
        <div class="confirm-icon">✓</div>
        <div class="confirm-title">You're in, ${escHtml(firstName)}!</div>
        <div class="confirm-sub">Stand by. Dispatch will text you with your grid assignment and a tracking link.</div>
        <div class="confirm-sub" style="font-weight:600;">Keep your phone on and charged.</div>
      </div>
    `;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
})();
</script>
</body>
</html>
